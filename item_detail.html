{% extends "base.html" %}
{% block content %}
<h2>{{ item.name }}</h2>
<div><strong>Restaurant:</strong> {{ item.restaurant_name }}</div>
<p>{{ item.description }}</p>
<p><strong>Price:</strong> ₹{{ item.price }}</p>
{% if session.get('user_id') %}
  <form method="post" action="{{ url_for('add_to_cart', item_id=item.item_id) }}">
    <label>Quantity</label><br>
    <input type="number" name="quantity" value="1" min="1" style="width:60px;">
    <button type="submit">Add to cart</button>
  </form>
{% else %}
  <p><a href="{{ url_for('login') }}">Login</a> to add to cart.</p>
{% endif %}
{% endblock %}
